name: Build model image

on:
  workflow_call:
    inputs:
      model_id:
        description: Model directory name under models/
        required: true
        type: string
      variant:
        description: Variant directory and Docker tag
        required: true
        type: string
      model_url:
        description: Optional download URL overriding MODEL_URL in model.env
        required: false
        default: ""
        type: string
      base_tag:
        description: Environment image tag
        required: false
        default: env-latest
        type: string
      image_tag:
        description: Published model image tag (defaults to variant)
        required: false
        default: ""
        type: string
    secrets:
      MODEL_DOWNLOAD_TOKEN:
        description: Optional Bearer token for downloading private models
        required: false
  workflow_dispatch:
    inputs:
      model_id:
        description: Model directory name under models/
        required: true
        default: qwen2.5-1.5b-instruct
        type: string
      variant:
        description: Variant directory and Docker tag
        required: true
        default: w4a16-rk3576
        type: string
      model_url:
        description: Optional download URL overriding MODEL_URL in model.env
        required: false
        type: string
      base_tag:
        description: Environment image tag
        required: true
        default: env-latest
        type: string
      image_tag:
        description: Published model image tag (defaults to variant)
        required: false
        type: string

permissions:
  contents: read
  packages: write

jobs:
  build:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4

      - name: Read and validate model definition
        id: model
        shell: bash
        env:
          INPUT_MODEL_ID: ${{ inputs.model_id }}
          INPUT_VARIANT: ${{ inputs.variant }}
          INPUT_MODEL_URL: ${{ inputs.model_url }}
          INPUT_IMAGE_TAG: ${{ inputs.image_tag }}
        run: |
          set -euo pipefail
          [[ "$INPUT_MODEL_ID" =~ ^[a-z0-9][a-z0-9._-]*$ ]]
          [[ "$INPUT_VARIANT" =~ ^[a-z0-9][a-z0-9._-]*$ ]]
          definition="models/$INPUT_MODEL_ID/$INPUT_VARIANT/model.env"
          test -f "$definition"
          set -a
          source "$definition"
          set +a
          MODEL_URL="${INPUT_MODEL_URL:-${MODEL_URL:-}}"
          test -n "$MODEL_URL"
          [[ "$MODEL_FILE" =~ ^[A-Za-z0-9][A-Za-z0-9._-]*\.rkllm$ ]]
          [[ "$TARGET_PLATFORM" =~ ^rk(3576|3588|3588s)$ ]]
          base_image="ghcr.io/${GITHUB_REPOSITORY,,}"
          image="$base_image/$INPUT_MODEL_ID"
          tag="${INPUT_IMAGE_TAG:-$INPUT_VARIANT}"
          [[ "$tag" =~ ^[A-Za-z0-9_][A-Za-z0-9_.-]{0,127}$ ]]
          {
            echo "url=$MODEL_URL"
            echo "file=$MODEL_FILE"
            echo "platform=$TARGET_PLATFORM"
            echo "sha256=${MODEL_SHA256:-}"
            echo "base_image=$base_image"
            echo "image=$image"
            echo "tag=$tag"
          } >> "$GITHUB_OUTPUT"

      - name: Download model
        shell: bash
        env:
          MODEL_URL: ${{ steps.model.outputs.url }}
          MODEL_FILE: ${{ steps.model.outputs.file }}
          MODEL_SHA256: ${{ steps.model.outputs.sha256 }}
          MODEL_DOWNLOAD_TOKEN: ${{ secrets.MODEL_DOWNLOAD_TOKEN }}
        run: |
          set -euo pipefail
          args=(--fail --location --retry 3 --output "models/.build/$MODEL_FILE")
          if [[ -n "$MODEL_DOWNLOAD_TOKEN" ]]; then
            args+=(--header "Authorization: Bearer $MODEL_DOWNLOAD_TOKEN")
          fi
          curl "${args[@]}" "$MODEL_URL"
          if [[ -n "$MODEL_SHA256" ]]; then
            echo "$MODEL_SHA256  models/.build/$MODEL_FILE" | sha256sum --check --strict
          fi

      - uses: docker/setup-qemu-action@v3

      - uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push model image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: docker/Dockerfile.model
          platforms: linux/arm64
          push: true
          build-args: |
            BASE_IMAGE=${{ steps.model.outputs.base_image }}:${{ inputs.base_tag }}
            MODEL_ID=${{ inputs.model_id }}:${{ inputs.variant }}
            MODEL_FILE=${{ steps.model.outputs.file }}
            TARGET_PLATFORM=${{ steps.model.outputs.platform }}
          tags: |
            ${{ steps.model.outputs.image }}:${{ steps.model.outputs.tag }}
            ${{ steps.model.outputs.image }}:${{ steps.model.outputs.tag }}-${{ github.sha }}
          cache-from: type=gha,scope=rkllm-${{ inputs.model_id }}-${{ inputs.variant }}
          cache-to: type=gha,mode=max,scope=rkllm-${{ inputs.model_id }}-${{ inputs.variant }}
