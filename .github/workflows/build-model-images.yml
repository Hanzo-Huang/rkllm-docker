name: Build model images

on:
  workflow_dispatch:
    inputs:
      scope:
        description: Models to build
        required: true
        default: all
        type: choice
        options:
          - all
          - model
          - variant
      model_id:
        description: Model directory name (required for model or variant scope)
        required: false
        type: string
      variant:
        description: Variant directory name (required when scope is variant)
        required: false
        type: string
      model_url:
        description: Optional download URL override for variant scope
        required: false
        type: string
      base_tag:
        description: Environment image tag used as the model image base
        required: true
        default: env-latest
        type: string
      image_tag:
        description: Optional published image tag override for variant scope
        required: false
        type: string

permissions:
  contents: read
  packages: write

concurrency:
  group: model-images-${{ github.ref }}
  cancel-in-progress: false

jobs:
  discover:
    runs-on: ubuntu-24.04
    outputs:
      matrix: ${{ steps.models.outputs.matrix }}
      count: ${{ steps.models.outputs.count }}
    steps:
      - uses: actions/checkout@v4

      - name: Discover model variants
        id: models
        shell: bash
        env:
          BUILD_SCOPE: ${{ inputs.scope }}
          INPUT_MODEL_ID: ${{ inputs.model_id }}
          INPUT_VARIANT: ${{ inputs.variant }}
          INPUT_MODEL_URL: ${{ inputs.model_url }}
          INPUT_IMAGE_TAG: ${{ inputs.image_tag }}
        run: |
          set -euo pipefail

          if [[ "$BUILD_SCOPE" == "model" || "$BUILD_SCOPE" == "variant" ]]; then
            [[ "$INPUT_MODEL_ID" =~ ^[a-z0-9][a-z0-9._-]*$ ]]
            test -d "models/$INPUT_MODEL_ID"
          fi

          if [[ "$BUILD_SCOPE" == "variant" ]]; then
            [[ "$INPUT_VARIANT" =~ ^[a-z0-9][a-z0-9._-]*$ ]]
            test -f "models/$INPUT_MODEL_ID/$INPUT_VARIANT/model.env"
          elif [[ "$BUILD_SCOPE" != "all" && "$BUILD_SCOPE" != "model" ]]; then
            echo "Unsupported build scope: $BUILD_SCOPE" >&2
            exit 1
          fi

          if [[ "$BUILD_SCOPE" != "variant" && ( -n "$INPUT_MODEL_URL" || -n "$INPUT_IMAGE_TAG" ) ]]; then
            echo "model_url and image_tag overrides require variant scope." >&2
            exit 1
          fi

          entries='[]'
          while IFS= read -r definition; do
            relative="${definition#models/}"
            model_id="${relative%%/*}"
            remainder="${relative#*/}"
            variant="${remainder%%/*}"

            if [[ "$BUILD_SCOPE" == "model" && "$model_id" != "$INPUT_MODEL_ID" ]]; then
              continue
            fi
            if [[ "$BUILD_SCOPE" == "variant" && ( "$model_id" != "$INPUT_MODEL_ID" || "$variant" != "$INPUT_VARIANT" ) ]]; then
              continue
            fi

            entries="$(
              jq -c \
                --arg model_id "$model_id" \
                --arg variant "$variant" \
                '. + [{model_id: $model_id, variant: $variant}]' \
                <<< "$entries"
            )"
          done < <(find models -mindepth 3 -maxdepth 3 -name model.env -print | sort)

          count="$(jq 'length' <<< "$entries")"
          if [[ "$count" -eq 0 ]]; then
            echo "No model definitions found for the requested scope." >&2
            exit 1
          fi

          echo "Discovered $count model variants:"
          jq -r '.[] | "- \(.model_id):\(.variant)"' <<< "$entries"
          echo "matrix=$(jq -c '{include: .}' <<< "$entries")" >> "$GITHUB_OUTPUT"
          echo "count=$count" >> "$GITHUB_OUTPUT"

  build:
    name: ${{ matrix.model_id }}:${{ matrix.variant }}
    needs: discover
    runs-on: ubuntu-24.04
    strategy:
      fail-fast: false
      max-parallel: 3
      matrix: ${{ fromJSON(needs.discover.outputs.matrix) }}
    steps:
      - uses: actions/checkout@v4

      - name: Read and validate model definition
        id: model
        shell: bash
        env:
          INPUT_MODEL_ID: ${{ matrix.model_id }}
          INPUT_VARIANT: ${{ matrix.variant }}
          INPUT_MODEL_URL: ${{ inputs.model_url }}
          INPUT_IMAGE_TAG: ${{ inputs.image_tag }}
        run: |
          set -euo pipefail
          [[ "$INPUT_MODEL_ID" =~ ^[a-z0-9][a-z0-9._-]*$ ]]
          [[ "$INPUT_VARIANT" =~ ^[a-z0-9][a-z0-9._-]*$ ]]
          definition="models/$INPUT_MODEL_ID/$INPUT_VARIANT/model.env"
          test -f "$definition"
          set -a
          source "$definition"
          set +a
          MODEL_URL="${INPUT_MODEL_URL:-${MODEL_URL:-}}"
          test -n "$MODEL_URL"
          [[ "$MODEL_FILE" =~ ^[A-Za-z0-9][A-Za-z0-9._-]*\.rkllm$ ]]
          [[ "$TARGET_PLATFORM" =~ ^rk(3576|3588|3588s)$ ]]
          base_image="ghcr.io/${GITHUB_REPOSITORY,,}"
          image="$base_image/$INPUT_MODEL_ID"
          tag="${INPUT_IMAGE_TAG:-$INPUT_VARIANT}"
          [[ "$tag" =~ ^[A-Za-z0-9_][A-Za-z0-9_.-]{0,127}$ ]]
          {
            echo "url=$MODEL_URL"
            echo "file=$MODEL_FILE"
            echo "platform=$TARGET_PLATFORM"
            echo "sha256=${MODEL_SHA256:-}"
            echo "base_image=$base_image"
            echo "image=$image"
            echo "tag=$tag"
          } >> "$GITHUB_OUTPUT"

      - name: Download model
        shell: bash
        env:
          MODEL_URL: ${{ steps.model.outputs.url }}
          MODEL_FILE: ${{ steps.model.outputs.file }}
          MODEL_SHA256: ${{ steps.model.outputs.sha256 }}
          MODEL_DOWNLOAD_TOKEN: ${{ secrets.MODEL_DOWNLOAD_TOKEN }}
        run: |
          set -euo pipefail
          args=(--fail --location --retry 3 --output "models/.build/$MODEL_FILE")
          if [[ -n "$MODEL_DOWNLOAD_TOKEN" ]]; then
            args+=(--header "Authorization: Bearer $MODEL_DOWNLOAD_TOKEN")
          fi
          curl "${args[@]}" "$MODEL_URL"
          if [[ -n "$MODEL_SHA256" ]]; then
            echo "$MODEL_SHA256  models/.build/$MODEL_FILE" | sha256sum --check --strict
          fi

      - uses: docker/setup-qemu-action@v3

      - uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push model image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: docker/Dockerfile.model
          platforms: linux/arm64
          push: true
          build-args: |
            BASE_IMAGE=${{ steps.model.outputs.base_image }}:${{ inputs.base_tag }}
            MODEL_ID=${{ matrix.model_id }}:${{ matrix.variant }}
            MODEL_FILE=${{ steps.model.outputs.file }}
            TARGET_PLATFORM=${{ steps.model.outputs.platform }}
          tags: |
            ${{ steps.model.outputs.image }}:${{ steps.model.outputs.tag }}
            ${{ steps.model.outputs.image }}:${{ steps.model.outputs.tag }}-${{ github.sha }}
          cache-from: type=gha,scope=rkllm-${{ matrix.model_id }}-${{ matrix.variant }}
          cache-to: type=gha,mode=max,scope=rkllm-${{ matrix.model_id }}-${{ matrix.variant }}
