name: Build environment image

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - "app/**"
      - "docker/Dockerfile"
      - "docker/entrypoint.sh"
      - "runtime/**"
      - "scripts/**"
      - "requirements.txt"
      - ".github/workflows/build-env-image.yml"

permissions:
  contents: read
  packages: write

concurrency:
  group: env-image-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-qemu-action@v3

      - uses: docker/setup-buildx-action@v3

      - name: Compute image name
        id: image
        shell: bash
        run: echo "name=ghcr.io/${GITHUB_REPOSITORY,,}" >> "$GITHUB_OUTPUT"

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push ARM64 environment image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: docker/Dockerfile
          platforms: linux/arm64
          push: true
          build-args: |
            VERSION=${{ github.sha }}
          tags: |
            ${{ steps.image.outputs.name }}:env-latest
            ${{ steps.image.outputs.name }}:env-${{ github.sha }}
          cache-from: type=gha,scope=rkllm-env
          cache-to: type=gha,mode=max,scope=rkllm-env

